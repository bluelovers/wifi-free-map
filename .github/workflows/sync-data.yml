name: Sync iTaiwan Data

on:
  schedule:
    # 每天 02:00 (台北時間 UTC+8 -> 18:00 UTC 前一天) 
    - cron: "0 18 * * *"
  workflow_dispatch:
    # 手動觸發
    inputs:
      run-sync:
        description: 'Run data sync script'
        required: true
        default: 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run sync script
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
        run: |
          pnpm ts-node scripts/sync-data.ts

      - name: Push changes
        if: github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync iTaiwan data (auto)'
          branch: main
          push_options: '--force'
          skip_dirty_check: false
